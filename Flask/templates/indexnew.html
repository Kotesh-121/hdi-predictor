<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Human Development Index Predictor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <div class="eyebrow">Machine Learning &middot; Flask &middot; Linear Regression</div>
    <h1 class="brand">Human Development Index</h1>
    <p class="tagline">A machine learning web application using Flask</p>

    <div class="card">
      {% if error %}
        <div class="error-box">{{ error }}</div>
      {% endif %}

      <form action="{{ url_for('predict') }}" method="POST">
        <div class="field">
          <label for="country">Select the name of the Country</label>
          <select id="country" name="country">
            <option value="">-- Choose a country --</option>
            {% for c in countries %}
              <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label for="life_expectancy">Enter Life Expectancy Rate <span class="hint">(range: 30 - 89)</span></label>
          <input type="number" id="life_expectancy" name="life_expectancy" min="30" max="89" step="0.1" placeholder="e.g. 68.5" required>
        </div>

        <div class="field">
          <label for="mean_schooling">Enter Mean Years of Schooling <span class="hint">(range: 1 - 15)</span></label>
          <input type="number" id="mean_schooling" name="mean_schooling" min="1" max="15" step="0.1" placeholder="e.g. 7.2" required>
        </div>

        <div class="field">
          <label for="gni">Enter GNI Per Capita <span class="hint">(range: 740 - 149000)</span></label>
          <input type="number" id="gni" name="gni" min="740" max="149000" step="1" placeholder="e.g. 12500" required>
        </div>

        <div class="field">
          <label for="internet_users">Enter the Number of Internet Users <span class="hint">(% of population, 0 - 100)</span></label>
          <input type="number" id="internet_users" name="internet_users" min="0" max="100" step="0.1" placeholder="e.g. 45.0" required>
        </div>

        <button type="submit" class="predict-btn">Predict</button>
      </form>
    </div>

    <footer class="note">ML - 0027 &middot; Trained with scikit-learn Linear Regression &middot; Served by Flask</footer>
  </div>
</body>
</html>
