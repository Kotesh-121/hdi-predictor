<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HDI Atlas{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="nav">
    <div class="wrap">
      <a href="{{ url_for('index') }}" class="brand">Atlas <small>HDI Predictor</small></a>
      <div class="nav-links">
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.path == '/' else '' }}">Predict</a>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.path == '/dashboard' else '' }}">Dashboard</a>
        <a href="{{ url_for('about') }}" class="{{ 'active' if request.path == '/about' else '' }}">Methodology</a>
      </div>
    </div>
  </nav>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="wrap" style="display:flex; justify-content:space-between; width:100%; flex-wrap:wrap;">
      <span class="foot-brand">ATLAS / HDI ML PREDICTOR</span>
      <span>Trained on a synthetic, formula-consistent dataset of 660 country-profiles &middot; RandomForest classifier &amp; regressor</span>
    </div>
  </footer>
</body>
</html>
